<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Freelance Platform - Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="mb-3 text-center">
                <a th:href="@{/view/offers}" class="text-decoration-none text-muted">&larr; Връщане към обявите</a>
            </div>

            <div class="card shadow">
                <div class="card-header bg-dark text-white text-center py-3">
                    <h4 class="mb-0 fw-bold">Вход в платформата</h4>
                </div>
                <div class="card-body p-4">

                    <div th:if="${param.success}" class="alert alert-success text-center" role="alert">
                        Регистрацията е успешна! Моля, влезте в профила си.
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger text-center" role="alert">
                        Невалидно потребителско име или парола!
                    </div>

                    <div th:if="${param.logout}" class="alert alert-info text-center" role="alert">
                        Излязохте успешно от системата.
                    </div>

                    <form th:action="@{/view/login}" method="post">

                        <div class="mb-3">
                            <label for="username" class="form-label fw-bold">Потребителско име</label>
                            <input type="text" id="username" name="username" class="form-control" placeholder="Въведете потребителско име" required autofocus>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label fw-bold">Парола</label>
                            <input type="password" id="password" name="password" class="form-control" placeholder="Въведете парола" required>
                        </div>

                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-dark fw-bold py-2">Влез</button>
                        </div>
                    </form>

                    <hr>
                    <div class="text-center">
                        <span class="text-muted">Нямате профил?</span>
                        <a th:href="@{/view/register}" class="fw-bold text-success text-decoration-none">Регистрирайте се тук</a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
