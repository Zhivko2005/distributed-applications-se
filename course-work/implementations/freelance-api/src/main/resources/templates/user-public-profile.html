<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Freelance Platform - Профил на потребител</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold text-success" th:href="@{/view/offers}">FreelancePlatform</a>
        <div class="d-flex align-items-center">
            <a th:href="@{/view/offers}" class="btn btn-sm btn-outline-light me-3">Към обявите</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-body text-center py-5">

                    <div class="rounded-circle bg-primary text-white d-inline-flex align-items-center justify-content-center mb-3"
                         style="width: 90px; height: 90px; font-size: 36px; font-weight: bold;"
                         th:text="${#strings.substring(user.username,0,1).toUpperCase()}">
                        U
                    </div>

                    <h3 class="fw-bold text-dark mb-1" th:text="${user.username}">username</h3>
                    <p class="text-muted mb-3" th:text="${user.email}">user@example.com</p>

                    <div class="mb-3">
                        <span th:each="role : ${user.roles}"
                              class="badge bg-secondary px-2 py-1 me-1 fw-bold"
                              th:text="${role.name.replace('ROLE_', '')}">USER</span>
                    </div>

                    <hr class="my-4">

                    <div class="text-start px-3">
                        <h5 class="fw-bold text-dark mb-2">📜 Биография / За мен:</h5>
                        <p class="text-muted bg-light p-3 rounded border" style="min-height: 100px; word-break: break-word;"
                           th:text="${user.biography != null && !user.biography.isEmpty()} ? ${user.biography} : 'Потребителят все още не е добавил биография.'"></p>
                    </div>

                    <div class="mt-4">
                        <a th:href="@{/view/offers(title='', maxPrice='')}" class="btn btn-outline-primary btn-sm">Покажи всички обяви</a>
                    </div>

                    <div class="mt-4 pt-2">
                        <hr style="opacity: 0.1;">
                        <p class="text-muted small mb-0">
                            📅 <strong>Регистриран на:</strong>
                            <span th:text="${user.createdAt != null} ? ${#temporals.format(user.createdAt, 'dd MMMM yyyy г.', #locale)} : 'Няма данни'">
      01 Януари 2026 г.
    </span>
                        </p>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
