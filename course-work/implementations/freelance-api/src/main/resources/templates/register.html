<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Freelance Platform - Регистрация</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="mb-3 text-center">
        <a th:href="@{/view/offers}" class="text-decoration-none text-muted">&larr; Връщане към обявите</a>
      </div>

      <div class="card shadow">
        <div class="card-header bg-success text-white text-center py-3">
          <h4 class="mb-0 fw-bold">Създаване на профил</h4>
        </div>
        <div class="card-body p-4">

          <div th:if="${errorMessage}" class="alert alert-danger text-center" th:text="${errorMessage}">
            Грешка при регистрацията!
          </div>

          <form th:action="@{/view/register}" th:object="${registerDto}" method="post">

            <div class="mb-3">
              <label for="username" class="form-label fw-bold">Потребителско име</label>
              <input type="text" id="username" th:field="*{username}" class="form-control" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'" placeholder="Напр. ivan_dev" required>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">Грешка в потребителското име</div>
            </div>

            <div class="mb-3">
              <label for="email" class="form-label fw-bold">Имейл адрес</label>
              <input type="email" id="email" th:field="*{email}" class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" placeholder="ivan@example.com" required>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Грешен формат на имейла</div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label fw-bold">Парола (минимум 8 символа)</label>
              <input type="password" id="password" th:field="*{password}" class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'" placeholder="********" required>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Грешка в паролата</div>
            </div>

            <div class="mb-4">
              <label for="confirmPassword" class="form-label fw-bold">Потвърдете паролата</label>
              <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control" th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'" placeholder="********" required>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">Грешка при потвърждението</div>
            </div>

            <div class="d-grid mb-3">
              <button type="submit" class="btn btn-success fw-bold py-2">Регистрация</button>
            </div>
          </form>

          <hr>
          <div class="text-center">
            <span class="text-muted">Вече имате профил?</span>
            <a th:href="@{/view/login}" class="fw-bold text-dark text-decoration-none">Влезте оттук</a>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
