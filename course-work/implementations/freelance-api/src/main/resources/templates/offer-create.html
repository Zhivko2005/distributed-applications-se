<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Freelance Platform - Създай обява</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold text-success" th:href="@{/view/offers}">FreelancePlatform</a>
    <span class="text-white">Нова обява</span>
  </div>
</nav>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-8">

      <div class="mb-3">
        <a th:href="@{/view/offers}" class="btn btn-sm btn-secondary">&larr; Назад към обявите</a>
      </div>

      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white py-3">
          <h4 class="mb-0 fw-bold">Публикуване на проект / обява</h4>
        </div>
        <div class="card-body p-4">

          <form th:action="@{/view/offers/create}" th:object="${offerDto}" method="post">

            <div class="mb-3">
              <label for="title" class="form-label fw-bold">Заглавие на проекта</label>
              <input type="text" id="title" th:field="*{title}" class="form-control"
                     placeholder="Напр. Изработка на онлайн магазин на WooCommerce" required>
            </div>

            <div class="mb-3">
              <label for="price" class="form-label fw-bold">Предвиден бюджет (в лв.)</label>
              <input type="number" step="0.01" id="price" th:field="*{price}" class="form-control"
                     placeholder="Напр. 450.00" required>
            </div>

            <div class="mb-3">
              <label for="description" class="form-label fw-bold">Детайлно описание на изискванията</label>
              <textarea id="description" th:field="*{description}" class="form-control" rows="6"
                        placeholder="Опишете подробно какви умения се изискват, какъв е крайният срок и задачите..." required></textarea>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold d-block">Изберете приложими категории:</label>
              <div class="row px-2">
                <div class="col-sm-4 form-check mb-2" th:each="cat : ${categories}">
                  <input class="form-check-input" type="checkbox"
                         th:value="${cat.id}"
                         th:id="|cat-${cat.id}|"
                         name="categoryIds">
                  <label class="form-check-label text-dark" th:for="|cat-${cat.id}|" th:text="${cat.name}">
                    Име на категория
                  </label>
                </div>
              </div>
            </div>

            <div class="d-flex justify-content-end border-top pt-3">
              <a th:href="@{/view/offers}" class="btn btn-outline-secondary me-2">Отказ</a>
              <button type="submit" class="btn btn-success px-4 fw-bold">Публикувай обявата</button>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
